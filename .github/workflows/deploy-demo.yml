name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install package deps
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install example deps
        working-directory: examples/basic
        run: npm install

      - name: Build example with Pages base
        working-directory: examples/basic
        env:
          VITE_BASE: /jarvis-ai-web-animation/
        run: npx vite build --base=/jarvis-ai-web-animation/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/basic/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
